stages:
  - lint
  - test

editorconfig:
  stage: lint
  script:
    - make lint.editorconfig
  tags:
    - docker
    - go

integration:
  stage: test
  script:
    - make test.build
    - make test.integration
  after_script:
    - docker compose -f docker-compose.test.yaml down
  tags:
    - docker
    - go

unit:
  stage: test
  script:
    - make test.unit
  tags:
    - docker
    - go

lint:
  image: golangci/golangci-lint:latest
  stage: test
  parallel:
    matrix:
      - LINTER:
          - govet
          - errcheck
          - gosec
          - staticcheck
          - misspell
          - ineffassign
          - noctx
          - bodyclose
          - nilerr
          - gofumpt
  script:
    - golangci-lint run --enable-only $LINTER ./...
