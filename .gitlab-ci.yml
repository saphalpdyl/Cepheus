stages:
  - lint
  - test

editorconfig:
  stage: lint
  script:
    - make lint.editorconfig
  tags:
    - docker
    - go

integration:
  stage: test
  script:
    - make test.build
    - make test.integration
  after_script:
    - docker compose -f docker-compose.test.yaml down
  rules:
    - changes:
        - libs/stamp/**/*
        - libs/scamper-client/**/*
        - docker-compose.test.yaml
        - docker/tests/**/*
        - docker/scamper.build.Dockerfile
    - when: manual
      allow_failure: true
  tags:
    - docker
    - go

unit:
  stage: test
  script:
    - make test.unit
  tags:
    - docker
    - go

lint:
  image: golangci/golangci-lint:latest
  stage: lint
  parallel:
    matrix:
      - LINTER:
          - govet
          - errcheck
          - gosec
          - staticcheck
          - misspell
          - ineffassign
          - noctx
          - bodyclose
          - nilerr
  script:
    - golangci-lint run --enable-only $LINTER ./...
