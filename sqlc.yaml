version: "2"
sql:
  # Trace processor
  - engine: "postgresql"
    queries: "db/queries/processors/trace-processor/"
    schema: 
      - "db/init/03-trace.sql"
      - "db/init/05-as_details.sql"
    gen:
      go:
        package: "traceprocessor_db"
        out: "services/trace-processor/db/"
        sql_package: "pgx/v5"
        overrides:
          - db_type: "inet"
            go_type:
              type: "Addr"
              import: "net/netip"
  - engine: "postgresql"
    queries: "db/queries/processors/stamp-processor/"
    schema:
      - "db/init/02-stamp.sql"
    gen:
      go:
        package: "stampprocessor_db"
        out: "services/stamp-processor/db/"
        sql_package: "pgx/v5"
  - engine: "postgresql"
    queries: "db/queries/processors/ping-processor/"
    schema:
      - "db/init/08-ping.sql"
    gen:
      go:
        package: "pingprocessor_db"
        out: "services/ping-processor/db/"
        sql_package: "pgx/v5"
  - engine: "postgresql"
    queries: "db/queries/argus/"
    schema:
      - "db/init/02-stamp.sql"
      - "db/init/07-argus.sql"
    gen:
      go:
        package: "argus_db"
        out: "services/argus/db/"
        sql_package: "pgx/v5"