version: "2"

linters:
  enable:
    - govet
    - gosec
    - errcheck
    - staticcheck
    - misspell
    - ineffassign
    - noctx
    - bodyclose
    - sqlclosecheck
    - nilerr
    - contextcheck
    - exhaustive
    - unparam
  settings:
    govet:
      enable-all: true

    gosec:
      severity: medium
      confidence: medium

    errcheck:
      check-type-assertions: true
      check-blank: false
      exclude-functions:
        - os.Remove
        - (*os.Process).Kill
        - (net.Conn).Close
        - (net.Conn).SetReadDeadline
        - (net.PacketConn).Close
        - (*cepheus/libs/stamp.Sender).Close
        - (github.com/jackc/pgx/v5.Tx).Rollback

    misspell:
      locale: US
