version: "2"

linters:
  enable:
    - govet
    - gosec
    - errcheck
    - staticcheck
    - misspell
    - ineffassign
    - noctx
    - bodyclose
    - sqlclosecheck
    - nilerr
    - contextcheck
    - exhaustive
    - unparam
  settings:
    govet:
      enable-all: true

    gosec:
      severity: medium
      confidence: medium

    errcheck:
      check-type-assertions: true
      check-blank: true

    misspell:
      locale: US
