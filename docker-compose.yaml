services:
  # ----- External Services -----
  db:
    image: timescale/timescaledb:latest-pg17
    container_name: cepheus-timescaledb
    environment:
      - POSTGRES_PASSWORD=admin
    volumes:
      - ./db/init/:/docker-entrypoint-initdb.d/
    ports: 
      - 5435:5432
  
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: cepheus-pgadmin
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@admin.com
      - PGADMIN_DEFAULT_PASSWORD=admin
    ports:
      - 5050:80
    depends_on:
      - db
  nats-server:
    image: nats:2.12.7-scratch
    container_name: cepheus-nats
    ports:
      - 4222:4222
      - 8222:8222
    command: ["--http_port", "8222", "-js", "-sd", "/data"]

  # ----- External Services -----

  # ----- Our own stuff -----

  cepheus-server:
    image: cepheus-server:latest
    container_name: cepheus-server
    build:
      context: .
      dockerfile: docker/cepheus-server.Dockerfile
    ports:
      - 8070:8080
    environment:
      - CEPHEUS_DB_URL=postgres://postgres:admin@db:5432/postgres?sslmode=disable
    depends_on:
      - db
      - otel-collector

  # Processors
  cepheus-stamp-processor:
    image: cepheus-stamp-processor:latest
    container_name: cepheus-stamp-processor
    build:
      context: .
      dockerfile: docker/cepheus-stamp-processor.Dockerfile
    ports:
      - 8080:8080
    environment:
      - OTEL_SINK=otel
      - OTEL_ENDPOINT=otel-collector:4318
      - "NATS_LISTEN_SUBJECT=cepheus.probe.stamp.*"
      - NATS_LISTEN_URL=nats://nats-server:4222
      - CEPHEUS_DB_URL=postgres://postgres:admin@db:5432/postgres?sslmode=disable
    depends_on:
      - db
      - nats-server

  cepheus-trace-processor:
    image: cepheus-trace-processor:latest
    container_name: cepheus-trace-processor
    build:
      context: .
      dockerfile: docker/cepheus-trace-processor.Dockerfile
    ports:
      - 8086:8080
    environment:
      - OTEL_SINK=otel
      - OTEL_ENDPOINT=otel-collector:4318
      - "NATS_LISTEN_SUBJECT=cepheus.probe.trace.*"
      - NATS_LISTEN_URL=nats://nats-server:4222
      - CEPHEUS_DB_URL=postgres://postgres:admin@db:5432/postgres?sslmode=disable
    depends_on:
      - db
      - nats-server

  cepheus-frontend:
    image: cepheus-frontend:latest
    container_name: cepheus-frontend
    build:
      context: ./frontend
      dockerfile: ../docker/cepheus-frontend.Dockerfile
    ports:
      - 4001:4000
    environment:
      - PHX_SERVER=true
      - PHX_HOST=localhost
      - PORT=4000
      - DATABASE_URL=ecto://postgres:admin@db:5432/postgres
      - SECRET_KEY_BASE=8PzQRZwBwPq9XeYp32l5psBz+xNFvUpi8f0jAlVAci3JsPOawRU5KFJGvgehEqRA
    depends_on:
      - db

  # ----- Our own stuff -----

  # ----- Telemetry ----- 
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    volumes:
      - ./telemetry/otel-collector.yaml:/etc/otelcol-contrib/config.yaml
    ports:
      - "4318:4318"   # OTLP HTTP
      - "8889:8889"   # Prometheus metrics exporter

  tempo:
    image: grafana/tempo:2.7.2
    volumes:
      - ./telemetry/tempo.yaml:/etc/tempo.yaml
      - tempo-data:/var/tempo
    command: ["-config.file=/etc/tempo.yaml"]

  loki:
    image: grafana/loki:latest
    volumes:
      - ./telemetry/loki.yaml:/etc/loki/local-config.yaml
      - loki-data:/loki
    command: ["-config.file=/etc/loki/local-config.yaml"]

  grafana:
    image: grafana/grafana:latest
    volumes:
      - ./telemetry/grafana/provisioning:/etc/grafana/provisioning
      - grafana-data:/var/lib/grafana
    ports:
      - "3001:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true

  # ----- Telemetry ----- 

volumes:
  tempo-data:
  loki-data:
  grafana-data: