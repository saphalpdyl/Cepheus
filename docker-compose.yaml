services:
  db:
    image: timescale/timescaledb:latest-pg17
    container_name: cepheus-timescaledb
    environment:
      - POSTGRES_PASSWORD=admin
    volumes:
      - timescale_data:/var/lib/postgresql/data
    ports: 
      - 5432:5432
  
  cepheus-server:
    image: cepheus-server:latest
    container_name: cepheus-server
    ports:
      - 8070:8080
  
volumes:
  timescale_data: