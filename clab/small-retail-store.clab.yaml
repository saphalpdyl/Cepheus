name: retail

topology:
  defaults:
    kind: linux
    network-mode: none

  nodes:
    core-switch-01:
      image: quay.io/frrouting/frr:10.5.1
      binds:
        - conf/routers/small-retail-store/core-switch-01/frr.conf:/etc/frr/frr.conf
        - conf/routers/small-retail-store/core-switch-01/daemons:/etc/frr/daemons

    core-switch-02:
      image: quay.io/frrouting/frr:10.5.1
      binds:
        - conf/routers/small-retail-store/core-switch-02/frr.conf:/etc/frr/frr.conf
        - conf/routers/small-retail-store/core-switch-02/daemons:/etc/frr/daemons

    access-switch-01:
      image: alpine:3.21
      exec:
        - ip link add br0 type bridge
        - ip link set eth1 master br0
        - ip link set eth2 master br0
        - ip link set br0 up

    access-switch-02:
      image: alpine:3.21
      exec:
        - ip link add br0 type bridge
        - ip link set eth1 master br0
        - ip link set br0 up

    security-appliance:
      image: cepheus-sa:latest
      binds:
        - conf/routers/small-retail-store/security-appliance/frr.conf:/etc/frr/frr.conf
        - conf/routers/small-retail-store/security-appliance/daemons:/etc/frr/daemons
        - ../dist/agent:/opt/cepheus-agent
      exec:
        - ip addr add 192.168.121.100/24 dev eth3
        - ip link set eth3 up
        - sysctl -w net.ipv4.ip_forward=1
        - iptables -t nat -A POSTROUTING -o eth3 -j MASQUERADE
        - sh -c '/opt/cepheus-agent/cepheus-agent security-appliance /opt/cepheus-agent/cepheus-agent.config.yaml >/proc/1/fd/1 2>/proc/1/fd/2 &'


    ap1:
      image: alpine:3.21
      binds:
        - ../dist/agent:/opt/cepheus-agent
      exec:
        - ip addr add 10.0.1.2/30 dev eth1
        - ip link set eth1 up
        - ip route add default via 10.0.1.1
        - sh -c '/opt/agent/cepheus-agent ap1 /opt/cepheus-agent/cepheus-agent.config.yaml >/proc/1/fd/1 2>/proc/1/fd/2 &'

  links:
    - endpoints: ["ap1:eth1", "access-switch-01:eth1"]

    - endpoints: ["access-switch-01:eth2", "core-switch-01:eth1"]
    - endpoints: ["access-switch-02:eth1", "core-switch-02:eth1"]

    - endpoints: ["core-switch-01:eth2", "core-switch-02:eth2"]
    - endpoints: ["core-switch-01:eth3", "security-appliance:eth1"]
    - endpoints: ["core-switch-02:eth3", "security-appliance:eth2"]

    - endpoints: ["security-appliance:eth3", "macvlan:eth0"]
