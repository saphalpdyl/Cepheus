name: retail

topology:
  defaults:
    kind: linux

  nodes:
    core-switch-01:
      image: quay.io/frrouting/frr:10.5.1
      binds:
        - conf/routers/small-retail-store/core-switch-01/frr.conf:/etc/frr/frr.conf
        - conf/routers/small-retail-store/core-switch-01/daemons:/etc/frr/daemons

    core-switch-02:
      image: quay.io/frrouting/frr:10.5.1
      binds:
        - conf/routers/small-retail-store/core-switch-02/frr.conf:/etc/frr/frr.conf
        - conf/routers/small-retail-store/core-switch-02/daemons:/etc/frr/daemons

    access-switch-01:
      image: alpine:3.21
      exec:
        - apk add --no-cache bridge-utils
        - brctl addbr br0
        - brctl stp br0 on
        - brctl addif br0 eth1 eth2 eth3
        - ip link set br0 up

    access-switch-02:
      image: alpine:3.21
      exec:
        - apk add --no-cache bridge-utils
        - brctl addbr br0
        - brctl stp br0 on
        - brctl addif br0 eth1 eth2
        - ip link set br0 up

    security-appliance:
      image: cepheus-sa:latest
      binds:
        - conf/routers/small-retail-store/security-appliance/frr.conf:/etc/frr/frr.conf
        - conf/routers/small-retail-store/security-appliance/daemons:/etc/frr/daemons
      env:
        MODE: reflector
      cmd: entrypoint-sa.sh

    ap1:
      image: cepheus-probe-agent:latest
      env:
        MODE: active

  links:
    # AP → AS-01
    - endpoints: ["ap1:eth1", "access-switch-01:eth1"]

    # AS-01 → both core switches
    - endpoints: ["access-switch-01:eth2", "core-switch-01:eth1"]
    - endpoints: ["access-switch-01:eth3", "core-switch-02:eth1"]

    # AS-02 → both core switches
    - endpoints: ["access-switch-02:eth1", "core-switch-01:eth2"]
    - endpoints: ["access-switch-02:eth2", "core-switch-02:eth2"]

    # inter-switch link CS-01 ↔ CS-02
    - endpoints: ["core-switch-01:eth3", "core-switch-02:eth3"]

    # both core switches → SA
    - endpoints: ["core-switch-01:eth4", "security-appliance:eth1"]
    - endpoints: ["core-switch-02:eth4", "security-appliance:eth2"]
