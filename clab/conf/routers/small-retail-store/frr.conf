# /etc/frr/frr.conf

interface vlan10
 ip address 10.0.10.1/24
 description corporate

interface vlan20
 ip address 10.0.20.1/24
 description pos

interface eth0
 description uplink-to-security-appliance

router bgp 65001
 bgp router-id 10.0.0.1
 neighbor 10.0.0.254 remote-as 65000   ! Security Appliance
 !
 address-family ipv4 unicast
  network 10.0.10.0/24
  network 10.0.20.0/24
  redistribute connected
 exit-address-family