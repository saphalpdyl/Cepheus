# Core Switch 01
# eth1 → access-switch-01
# eth2 → core-switch-02 (inter-switch link)
# eth3 → security-appliance

frr defaults traditional
hostname core-switch-01
log syslog informational

interface eth1
 ip address 10.0.1.1/30
 description to-access-switch-01
 ip ospf network point-to-point
 ip ospf hello-interval 1
 ip ospf dead-interval 4

interface eth2
 ip address 10.0.0.1/30
 description to-core-switch-02
 ip ospf network point-to-point
 ip ospf hello-interval 1
 ip ospf dead-interval 4

interface eth3
 ip address 10.0.0.5/30
 description to-security-appliance
 ip ospf network point-to-point
 ip ospf hello-interval 1
 ip ospf dead-interval 4

router ospf
 ospf router-id 10.0.0.1
 network 10.0.1.0/30 area 0
 network 10.0.0.0/30 area 0
 network 10.0.0.4/30 area 0
