# Core Switch 01
# eth1 → access-switch-01
# eth2 → access-switch-02
# eth3 → core-switch-02 (inter-switch link)
# eth4 → security-appliance

frr defaults traditional
hostname core-switch-01
log syslog informational

interface eth1
 ip address 10.0.1.1/30
 description to-access-switch-01

interface eth2
 ip address 10.0.1.5/30
 description to-access-switch-02

interface eth3
 ip address 10.0.0.1/30
 description to-core-switch-02

interface eth4
 ip address 10.0.0.5/30
 description to-security-appliance

router bgp 65001
 bgp router-id 10.0.0.1
 neighbor 10.0.0.2 remote-as 65001
 neighbor 10.0.0.6 remote-as 65000
 address-family ipv4 unicast
  redistribute connected
 exit-address-family
