# Security Appliance
# eth1 → core-switch-01
# eth2 → core-switch-02

frr defaults traditional
hostname security-appliance
log syslog informational

interface eth1
 ip address 10.0.0.6/30
 description to-core-switch-01

interface eth2
 ip address 10.0.0.10/30
 description to-core-switch-02

router bgp 65000
 bgp router-id 10.0.0.6
 neighbor 10.0.0.5 remote-as 65001
 neighbor 10.0.0.9 remote-as 65001
 address-family ipv4 unicast
  redistribute connected
 exit-address-family
