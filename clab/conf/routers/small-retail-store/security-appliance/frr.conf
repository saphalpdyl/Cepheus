# Security Appliance
# eth1 → core-switch-01
# eth2 → core-switch-02
# eth3 → WAN (macvlan to VM eth0)

frr defaults traditional
hostname security-appliance
log syslog informational

interface eth1
 ip address 10.0.0.6/30
 description to-core-switch-01
 ip ospf network point-to-point
 ip ospf hello-interval 1
 ip ospf dead-interval 4

interface eth2
 ip address 10.0.0.10/30
 description to-core-switch-02
 ip ospf network point-to-point
 ip ospf hello-interval 1
 ip ospf dead-interval 4

router ospf
 ospf router-id 10.0.0.6
 network 10.0.0.4/30 area 0
 network 10.0.0.8/30 area 0
 default-information originate always

ip route 0.0.0.0/0 192.168.121.1
